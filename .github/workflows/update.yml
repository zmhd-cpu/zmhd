name: Update IPTV Playlist

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  merge-playlists:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fetch remote playlist
        env:
          SONY_URL: ${{ secrets.SONY_URL }}
        run: |
          # Added --compressed so the m3u is readable text for sed
          curl -L -s --compressed -A "okhttp/4.12.0" -o sony.m3u "$SONY_URL"

      - name: Merge playlists
        run: |
          echo "#EXTM3U" > combined.m3u
          # Ensure video.m3u exists in your repo before running this!
          if [ -f video.m3u ]; then
            sed '1{/^#EXTM3U/d;}' video.m3u >> combined.m3u
          fi
          sed '/^#EXTM3U|^# Pushed|^# Telegram/d' sony.m3u >> combined.m3u

      - name: Commit and Push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "github-actions[bot]"
          git add sony.m3u combined.m3u
          
          # Only commit and push if the files actually changed
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Updated combined playlist"
            git push --force "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" HEAD:main
          else
            echo "No changes detected, skipping push."
          fi
